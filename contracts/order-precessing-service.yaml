asyncapi: 3.0.0
info:
  title: Order Processing Schemas
  version: 1.0.0

channels:
  orderPlaced:
    address: orders.placed.{env}
    messages:
      orderPlacedEvent:
        $ref: '#/components/messages/OrderPlaced'
  paymentProcessed:
    address: payments.processed.{env}
    messages:
      paymentProcessedEvent:
        $ref: '#/components/messages/PaymentProcessed'

components:
  messages:
    OrderPlaced:
      payload:
        $ref: '../schemas/orders.placed.{env}-value.json'
    PaymentProcessed:
      payload:
        schemaFormat: 'application/vnd.apache.avro;version=1.9.0'
        schema:
          $ref: '../schemas/user.registered-value.avsc'
name: "Schema Engine: Publish"

run-name: "🚀 Schema Engine: Publish to ${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'ta'
        type: choice
        options:
        - ta
        - ti
        - pp

jobs:
  generate-matrix:
    name: Scan Contracts Folder
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Build Schema Map
        id: set-matrix
        env:
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          # Use the user-selected environment instead of hardcoding all three
          JSON_ARRAY=$(ls schemas | jq -R . | jq -s -c \
            --arg env "$TARGET_ENV" \
            'map(. as $filename | 
              ($filename | split(".")[0]) as $base | 
              # If file has {env}, replace with selected env. Else, return single object.
              (if $base | contains("{env}") then $env else null end) as $selected_env | 
              {
                env: $selected_env,
                path: ("schemas/" + $filename),
                subject: (
                  if $selected_env != null 
                  then ($base | sub("{env}"; $selected_env) + "-value")
                  else ($base + "-value")
                  end
                )
              }
            )')
          
          echo "matrix=${JSON_ARRAY}" >> $GITHUB_OUTPUT

  publish-contracts:
    name: Release
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        schema-pair: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    
    env:
      SCHEMA_REGISTRY_URL: ${{ secrets.SR_URL }}
      SCHEMA_REGISTRY_API_KEY: ${{ secrets.SR_API_KEY }}
      SCHEMA_REGISTRY_API_SECRET: ${{ secrets.SR_API_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Register Schema Contract via script
        run: |
          chmod +x ./.scripts/manage-schema.sh
          ./.scripts/manage-schema.sh push "${{ matrix.schema-pair.subject }}" "${{ matrix.schema-pair.path }}"
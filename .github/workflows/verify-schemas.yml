name: "Schema Engine: Verification"

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-matrix:
    name: Scan Contracts Folder
    runs-on: ubuntu-latest
    # Define the list here to use it as a reference
    env:
      ENV_LIST: '["ta", "ti", "pp"]'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Build Schema Map
        id: set-matrix
        run: |
          # Use the env variable directly inside jq
          JSON_ARRAY=$(ls schemas | jq -R . | jq -s -c \
            --argjson envs "$ENV_LIST" \
            'map(. as $filename | 
              ($filename | split(".")[0]) as $base | 
              (if $base | contains("{env}") then $envs[] else null end) as $env | 
              {
                env: $env,
                path: ("schemas/" + $filename),
                subject: (
                  if $env != null 
                  then ($base | sub("{env}"; $env) + "-value")
                  else ($base + "-value")
                  end
                )
              }
            )')
          
          echo "matrix=${JSON_ARRAY}" >> $GITHUB_OUTPUT